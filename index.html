<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماسح الأكواد السري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(180deg, #6584e8 0%, #835ab9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        h1 { margin-top: 20px; font-size: 28px; }
        .subtitle { opacity: 0.9; margin-bottom: 20px; font-size: 14px; }

        /* حاوية الكاميرا */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            border: 4px solid white;
            border-radius: 20px;
            overflow: hidden;
            background: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* إطار المسح (Overlay) */
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 40%;
            border: 2px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .scan-frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            background: white;
            color: #6584e8;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #status { font-size: 14px; margin-top: 10px; color: #fff; }

        /* نافذة النتيجة */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            width: 85%; max-width: 320px; text-align: center;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <h1>امسح واربح! 🎉</h1>
    <p class="subtitle">ضع الكود السري داخل الإطار الأخضر</p>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-frame"></div>
    </div>

    <div class="controls">
        <button class="btn" id="captureBtn">إفحص الكود الآن</button>
        <div id="status">جاهز للمسح...</div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2 id="resTitle"></h2>
            <p id="resMsg" style="margin: 15px 0; font-size: 18px;"></p>
            <button class="btn" onclick="closeModal()" style="width: 100%; background: #6584e8; color: white;">إغلاق</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const status = document.getElementById('status');
        const resultModal = document.getElementById('resultModal');

        const SECRET_CODE = "ww2345";

        // تشغيل الكاميرا فور فتح الموقع
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "خطأ: لم يتم الوصول للكاميرا";
                console.error(err);
            }
        }

        startCamera();

        captureBtn.addEventListener('click', async () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // رسم اللقطة من الفيديو على الكانفاس
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            status.innerText = "جاري القراءة والتحليل... ⏳";
            captureBtn.disabled = true;

            try {
                // معالجة الصورة وتحويلها لـ OCR
                const result = await Tesseract.recognize(canvas, 'eng', {
                    logger: m => console.log(m)
                });

                // تنظيف النص (حروف وأرقام فقط)
                const scannedText = result.data.text.toLowerCase().replace(/[^a-z0-9]/g, '');
                
                console.log("النتيجة المقروءة:", scannedText);

                if (scannedText.includes(SECRET_CODE)) {
                    showResult("مبروووك! 🏆", "الكود صحيح، لقد فزت بجائزة!");
                } else {
                    showResult("حظ أوفر", "الكود المقروء (" + scannedText + ") غير مطابق.");
                }

            } catch (error) {
                status.innerText = "حدث خطأ أثناء المعالجة.";
            } finally {
                captureBtn.disabled = false;
                status.innerText = "جاهز للمسح مرة أخرى";
            }
        });

        function showResult(title, msg) {
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resMsg').innerText = msg;
            resultModal.style.display = 'flex';
        }

        function closeModal() {
            resultModal.style.display = 'none';
        }
    </script>
</body>
</html>

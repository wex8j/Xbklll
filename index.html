<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ماسح الجوائز - NHKFAA52</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --primary-bg: #5c7ae5; --accent: #ffcf00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(180deg, #6584e8 0%, #835ab9 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: white; padding: 20px;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 5px; font-weight: 900; }
        .info { font-size: 13px; opacity: 0.8; margin-bottom: 20px; }

        /* حاوية الكاميرا */
        .scanner-box {
            position: relative; width: 100%; aspect-ratio: 1; border: 4px solid white;
            border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #video { width: 100%; height: 100%; object-fit: cover; }

        /* منطقة التركيز لضمان قراءة السيفونة */
        .focus-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 30%; border: 2px solid #00ff00; border-radius: 8px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none;
        }

        .scan-anim {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #00ff00; box-shadow: 0 0 15px #00ff00; animation: move 2s infinite linear;
        }
        @keyframes move { 0%, 100% { top: 0; } 50% { top: 100%; } }

        .btn-check {
            margin-top: 25px; width: 100%; padding: 18px; border-radius: 50px;
            border: none; background: white; color: #6584e8; font-size: 20px;
            font-weight: 700; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* شاشة الفوز */
        .win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
            flex-direction: column; text-align: center;
        }
        .win-content { background: white; color: #333; padding: 40px 20px; border-radius: 30px; width: 85%; }
        .win-title { color: #835ab9; font-size: 30px; font-weight: 900; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #debugCanvas { display: none; } /* لإخفاء المعالجة البرمجية */
    </style>
</head>
<body>

    <div class="container">
        <h1>امسح واربح! 🎁</h1>
        <p class="info">وجه المربع الأخضر نحو الكود المحفور بدقة</p>

        <div class="scanner-box">
            <video id="video" autoplay playsinline></video>
            <div class="focus-area">
                <div class="scan-anim"></div>
            </div>
        </div>

        <button class="btn-check" id="scanBtn">إفحص الكود الآن</button>
        <p id="msg" style="margin-top:15px; font-size: 13px;"></p>
    </div>

    <div class="win-overlay" id="winScreen">
        <div class="win-content">
            <h2 class="win-title">مبروك الفوز! 🎉</h2>
            <p style="margin: 15px 0;">لقد فزت معنا بالكود السري الصحيح</p>
            <button class="btn-check" style="background: #835ab9; color: white;" onclick="location.reload()">إغلاق</button>
        </div>
    </div>

    <canvas id="debugCanvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scanBtn');
        const msg = document.getElementById('msg');
        const winScreen = document.getElementById('winScreen');
        const canvas = document.getElementById('debugCanvas');

        const SECRET_CODE = "NHKFAA52";

        // تشغيل الكاميرا
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { msg.innerText = "يرجى السماح بالوصول للكاميرا"; });

        scanBtn.onclick = async () => {
            msg.innerText = "جاري تحسين الصورة وقراءة الرمز... ⏳";
            scanBtn.disabled = true;

            const ctx = canvas.getContext('2d');
            // ضبط حجم الكانفاس ليأخذ فقط منطقة المربع الأخضر (لزيادة الدقة)
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            
            canvas.width = 400; // حجم ثابت للمعالجة
            canvas.height = 200;

            // قص منطقة التركيز فقط من الفيديو
            ctx.drawImage(video, videoWidth*0.15, videoHeight*0.35, videoWidth*0.7, videoHeight*0.3, 0, 0, 400, 200);

            // --- معالجة احترافية للصورة (للمعادن) ---
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                // تحويل لرمادي عالي التباين (Black & White Threshold)
                let avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                let threshold = 128; // عتبة الفصل بين الكود والمعدن
                let val = avg > threshold ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imgData, 0, 0);

            try {
                // القراءة باستخدام Tesseract
                const result = await Tesseract.recognize(canvas, 'eng');
                const text = result.data.text.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                
                console.log("الذكاء الاصطناعي قرأ: ", text);

                if (text.includes(SECRET_CODE)) {
                    winScreen.style.display = 'flex';
                } else {
                    msg.innerText = "لم يتم التعرف بوضوح. حاول تقريب الإضاءة أو تثبيت اليد.";
                    // إذا أردت رؤية ما قرأه لتصحيحه: msg.innerText = "قرأت: " + text;
                }
            } catch (e) {
                msg.innerText = "خطأ في المعالجة، حاول ثانية.";
            } finally {
                scanBtn.disabled = false;
            }
        };
    </script>
</body>
</html>

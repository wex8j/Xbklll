<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امسح واربح - ww2345</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(180deg, #6584e8 0%, #835ab9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .lang-selector { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; direction: ltr; }
        .lang-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.6); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        .lang-btn.active { background: white; color: #6584e8; }

        .main-content { padding: 20px; }
        h1 { font-size: 36px; font-weight: 700; margin-bottom: 15px; }
        .subtitle { font-size: 18px; margin-bottom: 40px; opacity: 0.9; }

        .camera-btn {
            background-color: white; color: #6584e8; border: none;
            padding: 15px 40px; border-radius: 30px; font-size: 20px;
            font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 10px; width: 260px; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* نافذة النتيجة */
        .result-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            text-align: center; width: 85%; max-width: 320px;
        }
        .close-btn {
            background: #6584e8; color: white; border: none; padding: 10px 25px;
            border-radius: 10px; margin-top: 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="lang-selector">
        <div class="lang-btn">EN</div>
        <div class="lang-btn active">العربية</div>
        <div class="lang-btn">كوردي</div>
    </div>

    <div class="main-content">
        <h1>امسح واربح! 🎉</h1>
        <p class="subtitle">امسح الكود السري لمعرفة الجائزة</p>

        <button class="camera-btn" id="scanTrigger">
            <span>📷</span>
            <span id="statusText">افتح الكاميرا</span>
        </button>

        <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;">
    </div>

    <div class="result-modal" id="resultModal">
        <div class="modal-content">
            <h2 id="resTitle"></h2>
            <p id="resMsg" style="margin-top:10px;"></p>
            <button class="close-btn" onclick="document.getElementById('resultModal').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        const scanTrigger = document.getElementById('scanTrigger');
        const imageInput = document.getElementById('imageInput');
        const statusText = document.getElementById('statusText');
        const resultModal = document.getElementById('resultModal');

        // الكود السري الجديد
        const SECRET_CODE = "ww2345";

        scanTrigger.onclick = () => imageInput.click();

        imageInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusText.innerText = "جاري القراءة...";
            scanTrigger.style.opacity = "0.7";

            try {
                // تفعيل القراءة
                const result = await Tesseract.recognize(file, 'eng');
                
                // تنظيف النص (حروف صغيرة وبدون مسافات)
                const scanned = result.data.text.toLowerCase().replace(/\s+/g, '');
                
                console.log("الذكاء الاصطناعي قرأ:", scanned);

                // التحقق: إذا النص يحتوي على الكود السري
                if (scanned.includes(SECRET_CODE)) {
                    showResult("مبروووك! 🏆", "لقد فزت معنا، الكود " + SECRET_CODE + " صحيح.");
                } else {
                    // إظهار النص المقروء للتاكد (اختياري، يمكنك حذفه لاحقاً)
                    showResult("حظ أوفر", "لم يتم العثور على الكود المطلوب.");
                }
            } catch (err) {
                showResult("خطأ", "فشل في معالجة الصورة. حاول مرة ثانية.");
            } finally {
                statusText.innerText = "افتح الكاميرا";
                scanTrigger.style.opacity = "1";
                imageInput.value = "";
            }
        };

        function showResult(title, msg) {
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resMsg').innerText = msg;
            resultModal.style.display = 'flex';
        }
    </script>
</body>
</html>

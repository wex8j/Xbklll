<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>المسح والربح</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #0f1419 0%, #1a232c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #1e2a36;
            border-radius: 40px;
            padding: 30px 20px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px #3a4a5a inset;
            border-bottom: 6px solid #2ecc71;
        }

        h1 {
            color: white;
            text-align: center;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            color: #a0b8cc;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 1rem;
            padding: 0 10px;
        }

        .scanner-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 25px;
            background: #0a0f14;
            box-shadow: 0 8px 20px #00000080, 0 0 0 3px #2e3b47;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(46, 204, 113, 0.3);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #2ecc71;
            border-style: solid;
            filter: drop-shadow(0 0 8px #2ecc71);
        }

        .corner-tl { top: 15px; left: 15px; border-width: 5px 0 0 5px; border-radius: 20px 0 0 0; }
        .corner-tr { top: 15px; right: 15px; border-width: 5px 5px 0 0; border-radius: 0 20px 0 0; }
        .corner-bl { bottom: 15px; left: 15px; border-width: 0 0 5px 5px; border-radius: 0 0 0 20px; }
        .corner-br { bottom: 15px; right: 15px; border-width: 0 5px 5px 0; border-radius: 0 0 20px 0; }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #2ecc71;
            box-shadow: 0 0 15px #2ecc71, 0 0 30px #2ecc71;
            top: 50%;
            left: 0;
            animation: scanAnimation 2.5s ease-in-out infinite;
            opacity: 0.7;
        }

        @keyframes scanAnimation {
            0% { top: 15%; }
            50% { top: 85%; }
            100% { top: 15%; }
        }

        .camera-btn {
            width: 100%;
            background: #2ecc71;
            border: none;
            color: #0a1a0e;
            padding: 18px 20px;
            border-radius: 60px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a8c4a, 0 6px 12px black;
            transition: all 0.1s ease;
            border: 2px solid #54d98c;
            text-shadow: 0 1px 2px #a8ffc4;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .camera-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a8c4a, 0 6px 12px black;
        }

        .camera-btn.stop-btn {
            background: #e74c3c;
            box-shadow: 0 8px 0 #a82315, 0 6px 12px black;
            border: 2px solid #f07b6e;
            color: white;
            text-shadow: 0 1px 3px #4a0000;
        }

        .instruction {
            text-align: center;
            color: #9aafc4;
            font-size: 0.95rem;
            margin-top: 10px;
            padding: 0 10px;
        }

        .result-popup {
            background: #15222e;
            border-radius: 25px;
            padding: 18px 20px;
            margin-bottom: 15px;
            text-align: center;
            border: 2px solid #3a5568;
            transition: 0.2s;
        }

        #resultMessage {
            font-size: 1.8rem;
            font-weight: 900;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .win-message {
            color: #2ecc71;
            text-shadow: 0 0 20px #1a8c4a;
        }

        .lose-message {
            color: #e74c3c;
            text-shadow: 0 0 15px #a82315;
        }

        .default-message {
            color: #7a93a8;
            font-size: 1rem;
        }

        #scannedCodeDisplay {
            color: #6d8da8;
            font-size: 0.9rem;
            margin-top: 5px;
            font-family: monospace;
        }

        .debug-info {
            background: #0d151c;
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #5a7a8a;
            text-align: left;
            direction: ltr;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>المسح والربح!</h1>
    <div class="subtitle">
        المسح الرمز الموجود على العلبة<br>للتحقق مما إذا كنت فائزاً!
    </div>

    <!-- منطقة الكاميرا -->
    <div class="scanner-wrapper" id="scannerWrapper">
        <video id="cameraVideo" autoplay playsinline></video>
        <div class="scan-overlay">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line" id="scanLine"></div>
        </div>
    </div>

    <!-- منطقة النتيجة -->
    <div class="result-popup" id="resultPopup">
        <div id="resultMessage" class="default-message">🎁 جاهز للمسح</div>
        <div id="scannedCodeDisplay"></div>
    </div>

    <!-- زر الكاميرا الرئيسي -->
    <button class="camera-btn" id="toggleCameraBtn">📷 افتتح الكاميرا</button>
    
    <div class="instruction">
        وجّه الكاميرا نحو الرمز المحفور على العلبة
    </div>
    
    <!-- معلومات تصحيح (تقدر تحذفها إذا ما تريدها) -->
    <div class="debug-info" id="debugInfo">
        ⚡ جاهز للقراءة - انتظر كود يحتوي على أحرف وأرقام إنجليزية
    </div>
</div>

<script>
    (function(){
        "use strict";

        // الكود السري (مخفي تماماً)
        const SECRET_CODE = "3txn";
        const SCAN_INTERVAL_MS = 150;

        // عناصر DOM
        const video = document.getElementById('cameraVideo');
        const toggleBtn = document.getElementById('toggleCameraBtn');
        const resultMessageDiv = document.getElementById('resultMessage');
        const scannedCodeDisplay = document.getElementById('scannedCodeDisplay');
        const scanLine = document.getElementById('scanLine');
        const debugInfo = document.getElementById('debugInfo');

        // متغيرات الحالة
        let currentStream = null;
        let scanTimer = null;
        let isCameraActive = false;
        let lastScannedCode = '';
        let lastResultTimestamp = 0;
        const RESULT_COOLDOWN_MS = 2000;

        // Canvas للتحليل
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // تحديث واجهة الزر
        function updateUIForCamera(active) {
            if (active) {
                toggleBtn.innerHTML = '⏹️ إغلاق الكاميرا';
                toggleBtn.classList.add('stop-btn');
                scanLine.style.display = 'block';
            } else {
                toggleBtn.innerHTML = '📷 افتتح الكاميرا';
                toggleBtn.classList.remove('stop-btn');
                scanLine.style.display = 'none';
            }
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            video.srcObject = null;
            isCameraActive = false;
            
            if (scanTimer) {
                clearInterval(scanTimer);
                scanTimer = null;
            }
            
            updateUIForCamera(false);
        }

        // عرض النتيجة
        function displayResult(scannedText, isWin) {
            if (isWin) {
                resultMessageDiv.innerHTML = '🏆 مبروك! أنت فائز! 🏆';
                resultMessageDiv.className = 'win-message';
                scannedCodeDisplay.textContent = '🎉 الرمز صحيح - لقد ربحت الجائزة!';
                debugInfo.innerHTML = '✅ فوز! الكود: ' + scannedText;
            } else {
                resultMessageDiv.innerHTML = '😞 حظ أوفر';
                resultMessageDiv.className = 'lose-message';
                scannedCodeDisplay.textContent = `الرمز الممسوح: ${scannedText || 'غير صالح'}`;
                debugInfo.innerHTML = `❌ خطأ - المقروء: "${scannedText}" | المطلوب: "${SECRET_CODE}"`;
            }

            lastScannedCode = scannedText;
            lastResultTimestamp = Date.now();
        }

        // دالة تنظيف النص - تخلي فقط الأحرف الإنجليزية والأرقام
        function cleanScannedText(rawText) {
            // نحذف كل شي مو حرف إنجليزي (كبير أو صغير) أو رقم
            let cleaned = rawText.replace(/[^a-zA-Z0-9]/g, '');
            
            // نحول لأحرف صغيرة عشان المقارنة
            cleaned = cleaned.toLowerCase();
            
            return cleaned;
        }

        // مسح الإطار - مع التركيز على الأحرف الإنجليزية والأرقام فقط
        function scanFrame() {
            if (!isCameraActive) return;
            if (!video.videoWidth || !video.videoHeight) return;

            // ضبط حجم canvas
            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // رسم الإطار الحالي
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // الحصول على بيانات الصورة
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // محاولة قراءة الكود
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "attemptBoth",
            });

            if (code && code.data) {
                let rawText = code.data;
                
                // عرض النص الخام للتشخيص
                debugInfo.innerHTML = `📷 تم القراءة: "${rawText}" | جاري التنظيف...`;
                
                // تنظيف النص: نحتفظ فقط بالأحرف الإنجليزية والأرقام
                let cleanedText = cleanScannedText(rawText);
                
                // إذا بعد التنظيف صار فارغ، معناه ماكو أحرف/أرقام إنجليزية
                if (!cleanedText) {
                    debugInfo.innerHTML = `⚠️ النص المقروء "${rawText}" لا يحتوي على أحرف/أرقام إنجليزية`;
                    return;
                }
                
                debugInfo.innerHTML = `🔍 بعد التنظيف: "${cleanedText}"`;
                
                const now = Date.now();
                
                // منع تكرار نفس النتيجة بسرعة
                if (cleanedText === lastScannedCode && (now - lastResultTimestamp) < RESULT_COOLDOWN_MS) {
                    return;
                }

                // التحقق من الكود
                const isWinner = (cleanedText === SECRET_CODE);
                displayResult(cleanedText, isWinner);
            }
        }

        // بدء حلقة المسح
        function startScanLoop() {
            if (scanTimer) clearInterval(scanTimer);
            scanTimer = setInterval(() => {
                scanFrame();
            }, SCAN_INTERVAL_MS);
        }

        // تشغيل الكاميرا
        async function startCamera() {
            try {
                stopCamera();
                
                // طلب الكاميرا الخلفية بدقة عالية
                const constraints = {
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1920 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => resolve();
                });

                await video.play();
                
                isCameraActive = true;
                updateUIForCamera(true);
                startScanLoop();
                
                // إعادة تعيين الرسالة
                resultMessageDiv.innerHTML = '🔍 وجّه الكاميرا نحو الرمز';
                resultMessageDiv.className = 'default-message';
                scannedCodeDisplay.textContent = '';
                lastScannedCode = '';
                debugInfo.innerHTML = '⚡ الكاميرا نشطة - انتظر كود يحتوي على أحرف وأرقام إنجليزية';
                
            } catch (error) {
                console.error("خطأ في الكاميرا:", error);
                resultMessageDiv.innerHTML = '❌ تعذر الوصول للكاميرا';
                resultMessageDiv.className = 'lose-message';
                scannedCodeDisplay.textContent = 'تأكد من السماح بالوصول للكاميرا';
                debugInfo.innerHTML = '❌ خطأ في الكاميرا: ' + error.message;
                isCameraActive = false;
                updateUIForCamera(false);
            }
        }

        // تبديل الكاميرا
        function toggleCamera() {
            if (isCameraActive) {
                stopCamera();
                resultMessageDiv.innerHTML = '🎁 جاهز للمسح';
                resultMessageDiv.className = 'default-message';
                scannedCodeDisplay.textContent = '';
                debugInfo.innerHTML = '⚡ جاهز للقراءة - اضغط افتح الكاميرا';
            } else {
                startCamera();
            }
        }

        // ربط الزر
        toggleBtn.addEventListener('click', toggleCamera);

        // تنظيف عند مغادرة الصفحة
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            if (scanTimer) {
                clearInterval(scanTimer);
            }
        });

        // الحالة الأولية
        updateUIForCamera(false);
        scanLine.style.display = 'none';
        
        // رسالة ترحيبية
        resultMessageDiv.innerHTML = '🎁 جاهز للمسح';
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ماسح الجوائز الملكي - NHKFAA52</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root {
            --primary-bg: linear-gradient(180deg, #6584e8 0%, #835ab9 100%);
            --win-bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --accent-gold: #ffcf00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--primary-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
            padding: 15px;
        }

        /* رأس الصفحة */
        header { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        h1 { font-size: 26px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .subtitle { opacity: 0.8; font-size: 13px; }

        /* حاوية الكاميرا */
        .scan-zone {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            border: 6px solid rgba(255,255,255,0.8);
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        #video { width: 100%; height: 100%; object-fit: cover; }

        /* إطار التوجيه المتحرك */
        .guide-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 35%;
            border: 3px solid #00ff00; border-radius: 12px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: rgba(0, 255, 0, 0.8);
            box-shadow: 0 0 20px 5px rgba(0, 255, 0, 0.6);
            animation: scanning 1.8s infinite linear;
        }

        @keyframes scanning { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* منطقة التحكم */
        .controls { margin-top: 25px; width: 100%; max-width: 300px; text-align: center; }
        .scan-btn {
            background: white; color: #6584e8; border: none;
            width: 100%; padding: 16px; border-radius: 50px;
            font-size: 19px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .scan-btn:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .scan-btn:disabled { opacity: 0.5; cursor: wait; }

        #status { font-size: 12px; margin-top: 10px; opacity: 0.8; height: 1.2em; }

        /* ========================================= */
        /* === شاشة الفوز الخرافية (الشغل الصدك) === */
        /* ========================================= */
        #winnerOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s ease;
        }

        #winnerOverlay.show { display: flex; opacity: 1; }

        .win-card {
            background: var(--win-bg); color: #333;
            width: 90%; max-width: 340px;
            padding: 40px 20px; border-radius: 30px;
            text-align: center; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid var(--accent-gold);
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #winnerOverlay.show .win-card { transform: scale(1); }

        .crown-icon { font-size: 60px; margin-bottom: 10px; display: block; }

        /* عبارة مبروك الفوز المتحركة */
        .win-title {
            font-size: 38px; font-weight: 900; color: #835ab9;
            margin-bottom: 15px;
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(131,90,185,0.3); }
            50% { transform: scale(1.05); text-shadow: 0 0 25px rgba(131,90,185,0.6); }
        }

        .win-msg { font-size: 18px; line-height: 1.5; margin-bottom: 30px; }
        .code-display { font-weight: bold; color: #6584e8; background: rgba(101,132,232,0.1); padding: 2px 8px; border-radius: 5px; }

        .close-win-btn {
            background: #835ab9; color: white; border: none;
            padding: 14px 30px; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            width: 100%; box-shadow: 0 5px 15px rgba(131,90,185,0.3);
        }

        /* عناصر القصاصات الملونة (Confetti) */
        .confetti {
            position: absolute; width: 10px; height: 10px;
            background: #ffd700; top: -10px;
            border-radius: 50%;
            animation: confettiDrop 2.5s infinite linear;
        }

        @keyframes confettiDrop {
            0% { top: -10px; transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { top: 100%; transform: translateX(var(--drop-x)) rotate(var(--drop-r)); opacity: 0; }
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>امسح واربح! 🎉</h1>
        <p class="subtitle">ضع الكود السري الحقيقي داخل الإطار الأخضر</p>
    </header>

    <div class="scan-zone">
        <video id="video" autoplay playsinline></video>
        <div class="guide-box">
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="controls">
        <button class="scan-btn" id="captureBtn">إفحص الكود الآن 🔍</button>
        <div id="status">جاهز للمسح...</div>
    </div>

    <div id="winnerOverlay">
        <div class="win-card">
            <span class="crown-icon">🏆</span>
            <h2 class="win-title">مبروووك الفوز!</h2>
            <p class="win-msg">أنت فائز حقيقي معنا. لقد تم التعرف على الكود السري <span class="code-display">NHKFAA52</span> بنجاح.</p>
            <button class="close-win-btn" onclick="closeWinnerScreen()">إغلاق ومتابعة</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const status = document.getElementById('status');
        const winnerOverlay = document.getElementById('winnerOverlay');

        // الكود السري الحقيقي والنهائي
        const SECRET_CODE = "NHKFAA52"; 
        
        let isProcessing = false;

        // تشغيل الكاميرا فور فتح الموقع
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "خطأ: لم يتم الوصول للكاميرا. تأكد من الأذونات.";
                console.error(err);
            }
        }

        startCamera();

        captureBtn.addEventListener('click', async () => {
            if (isProcessing) return; // منع التكرار إذا كان جاري المعالجة
            isProcessing = true;

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 1. أخذ لقطة من الفيديو
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 2. معالجة الصورة لتقليل التشويش (تحسين القراءة من الشاشات)
            // تحويل للأبيض والأسود وزيادة التباين
            context.filter = 'grayscale(100%) contrast(150%)';
            context.drawImage(canvas, 0, 0); // رسم الصورة المعدلة فوق الأصلية
            context.filter = 'none'; // إعادة الفلتر لوضعه الطبيعي

            status.innerText = "جاري القراءة والتحليل بدقة... ⏳";
            captureBtn.disabled = true;
            captureBtn.innerText = "جاري الفحص...";

            try {
                // 3. تحليل الصورة باستخدام Tesseract (حروف وأرقام فقط)
                const result = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                    logger: m => console.log(m.progress)
                });

                // 4. تنظيف النص المستخرج (مسح كل شي ما عدا الحروف والأرقام)
                const scannedRaw = result.data.text.replace(/[^a-zA-Z0-9]/g, '');
                
                // تحويل للـ UpperCase للمقارنة العادلة (لأن المستخدم كتبه بالكبير)
                const scannedText = scannedRaw.toUpperCase();
                
                console.log("النتيجة الخام:", scannedRaw);
                console.log("النتيجة للمقارنة:", scannedText);

                // 5. التحقق من الكود
                if (scannedText.includes(SECRET_CODE.toUpperCase())) {
                    showWinnerScreen();
                } else {
                    // إذا لم يجد الكود، نظهر النص الذي قرأه للتصحيح (اختياري)
                    status.innerText = "حظ أوفر. الكود المقروء (" + scannedRaw + ") غير صحيح.";
                    captureBtn.disabled = false;
                    captureBtn.innerText = "إفحص الكود الآن 🔍";
                    isProcessing = false;
                }

            } catch (error) {
                status.innerText = "حدث خطأ أثناء معالجة الصورة. حاول مرة أخرى.";
                captureBtn.disabled = false;
                captureBtn.innerText = "إفحص الكود الآن 🔍";
                isProcessing = false;
            }
        });

        // =========================================
        // === وظائف شاشة الفوز المتحركة ===
        // =========================================
        function showWinnerScreen() {
            // إيقاف الكاميرا لمنع التكرار
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            
            // إنشاء قصاصات الورق الملونة
            createConfetti();
            
            // إظهار الشاشة
            winnerOverlay.classList.add('show');
            status.innerText = "تم الفوز! 🎉";
        }

        function closeWinnerScreen() {
            winnerOverlay.classList.remove('show');
            // إزالة القصاصات
            const confettis = document.querySelectorAll('.confetti');
            confettis.forEach(c => c.remove());
            
            // إعادة تشغيل الكاميرا وجاهزية الزر
            startCamera();
            captureBtn.disabled = false;
            captureBtn.innerText = "إفحص الكود الآن 🔍";
            status.innerText = "جاهز للمسح مرة أخرى...";
            isProcessing = false;
        }

        // دالة إنشاء قصاصات الورق الملونة (Confetti)
        function createConfetti() {
            const colors = ['#ffd700', '#ffcf00', '#835ab9', '#6584e8', '#ff4d4d', '#4dff4d'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                
                // متغيرات عشوائية للحركة
                confetti.style.setProperty('--drop-x', (Math.random() * 200 - 100) + 'px');
                confetti.style.setProperty('--drop-r', (Math.random() * 720 - 360) + 'deg');
                
                // تأخير عشوائي
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 1 + 2) + 's'; // بين 2-3 ثواني
                
                winnerOverlay.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
